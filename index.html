<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Chess board</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body>
<header class="game-header">
    <h1>Chess scientist</h1>
    <p class="subtitle">Improve your chess with data.</p>
</header>

<main class="container">
    
    <section class="board-wrapper">
        <p class="tip">
            Orange arrows show the 5 most common continuations from this position. <br>
            The size of the arrow corresponds to the number of times that move was played.
        </p>
        
        <div id="board"></div>
        <p class="tip" id="drag-tip">Drag pieces to play!</p>
    </section>

    <aside class="sidebar">
        <section class="info-panel">
            <h2>Game Statistics</h2>
            <div id="counter"></div>
            <div id="history-log"> </div>
        </section>

        <section class="filter-panel">
            <h2>Control Panel</h2>
            <div class="button-group">
                <button id="undoBtn" class="btn-secondary">Undo</button>
                <button id="resetBtn" class="btn-danger">Reset</button>
            </div>
            <div class="control-group">
                <label>ELO Range: <span id="eloMinDisplay">1200</span> - <span id="eloMaxDisplay">2800</span></label>
                
                <div class="range-slider-container">
                    <input type="range" id="eloMin" min="800" max="2800" step="50" value="1200">
                    <input type="range" id="eloMax" min="800" max="2800" step="50" value="2800">
                    <div class="slider-track"></div>
                </div>
                <div class="tick-container">
                    <span>800</span>
                    <span>1300</span>
                    <span>1800</span>
                    <span>2300</span>
                    <span>2800</span>
                </div>
            </div>

            <div class="control-group">
                <label>Winner</label>
                <select id="resultFilter">
                    <option value="both">All</option>
                    <option value="white">White</option>
                    <option value="black">Black</option>
                    <option value="draw">Draw</option>
                </select>
            </div>

            <div class="control-group">
                <label>Time Control</label>
                <select id="incrementFilter">
                    <option value="all">All</option>
                    <option value="15+10">15 + 10</option>
                    <option value="10+0">10 + 0</option>
                    <option value="5+5">5 + 5</option>
                </select>
            </div>
    </aside>
</main>

<script src="js/board.js"></script>
<script src="js/pieces.js"></script>
<script src="js/elo.js"></script>
<script src="js/main.js"></script>
</body>
</html>
